name: wf-ci-production
on:
  pull_request:
    branches:
      - production
      - main
jobs:
  ci-production-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkcout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{github.ref}} 
      - name: LInt HTML and CSS 
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"
      - name: Test Build In Production
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"