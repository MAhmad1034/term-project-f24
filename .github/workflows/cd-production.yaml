name: wf-cd-production
on:
  push:
    branches:
      - production
      - main

jobs:
  build-production-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{github.ref}}
      - name: Build Website for Production 
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3 
        with:
          path: "./dist"
          name: "build-artifact-staging"
  deploy-production-job:
    needs: "build-production-job"
    environment: "production-env"
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Production Artifact 
        uses: actions/deploy-pages@v4 
        with:
          artifact_name: "build-artifact-staging"
          token: ${{github.token}}  
  
    